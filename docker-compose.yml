services:
  postgres:
    image: postgres:16
    container_name: mutuity-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mutuity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mutuity"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mutuity
    entrypoint: ["bash", "./database/migrate.sh"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mutuity-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 5050
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mutuity
      PG_DEFAULT_ROLE: anonymous
      GRAPHILE_SCHEMA: app_public
      GRAPHILE_EXTENDED_ERRORS: hint,detail,errcode
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "5050:5050"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mutuity-worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mutuity
      WORKER_CONCURRENCY: 5
      WORKER_POLL_INTERVAL: 2000
    command: ["npm", "--workspace", "backend", "run", "start:worker"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mutuity-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:5050/graphql
      NEXT_PUBLIC_DEFAULT_LOCALE: fr
    ports:
      - "3000:3000"

volumes:
  postgres_data:
